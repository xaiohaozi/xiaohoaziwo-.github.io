<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蔚蓝电竞 · 全局可改价目表</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎮 蔚蓝电竞 - 价目表</h1>
        </header>

        <div class="content">
            <div class="admin-section">
                <button id="adminBtn" class="admin-btn">🔐 管理员模式</button>
            </div>

            <div id="adminPanel" class="admin-panel hidden">
                <div class="panel-header">
                    <h2>管理员面板</h2>
                    <button id="closeAdminBtn" class="close-btn">×</button>
                </div>
                
                <div class="panel-content">
                    <div class="form-group">
                        <label>商品名称：</label>
                        <input type="text" id="itemName" placeholder="输入商品名称">
                    </div>
                    <div class="form-group">
                        <label>价格：</label>
                        <input type="number" id="itemPrice" placeholder="输入价格" min="0" step="0.01">
                    </div>
                    <div class="form-group">
                        <label>描述：</label>
                        <input type="text" id="itemDesc" placeholder="输入商品描述">
                    </div>
                    <button id="addBtn" class="btn-primary">➕ 添加商品</button>
                    <button id="saveBtn" class="btn-success">💾 保存数据</button>
                    <button id="clearBtn" class="btn-danger">🗑️ 清空数据</button>
                </div>
            </div>

            <div class="items-grid" id="itemsGrid">
                <!-- 商品卡片动态生成 -->
            </div>
        </div>

        <footer>
            <p>© 2026 蔚蓝电竞 | 数据已本地保存</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
